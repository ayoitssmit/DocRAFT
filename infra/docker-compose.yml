# ── DocRAFT Development Stack ────────────────────────────────────────────────
# Usage: docker compose -f infra/docker-compose.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: docraft_backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app          # hot-reload via Uvicorn --reload
    environment:
      - ENVIRONMENT=development
      - FRONTEND_ORIGIN=http://localhost:3000
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - QDRANT_HOST=vector-db
      - QDRANT_PORT=6333
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
    depends_on:
      vector-db:
        condition: service_healthy
      phoenix:
        condition: service_started
    networks:
      - docraft_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: docraft_frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules         # anonymous volume — keep container's node_modules
      - /app/.next                # anonymous volume — keep build cache
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true    # enables hot-reload inside Docker on Windows
    depends_on:
      - backend
    networks:
      - docraft_net
    restart: unless-stopped

  # ── Qdrant Vector Database ──────────────────────────────────────────────
  vector-db:
    image: qdrant/qdrant:latest
    container_name: docraft_qdrant
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - docraft_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Arize Phoenix Observability ──────────────────────────────────────────
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: docraft_phoenix
    ports:
      - "6006:6006"    # Web UI & OTLP HTTP receiver
      - "4317:4317"    # OTLP gRPC receiver
    networks:
      - docraft_net
    restart: unless-stopped

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  qdrant_data:

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  docraft_net:
    driver: bridge
